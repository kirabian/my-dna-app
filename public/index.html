<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA Ancestry Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen">
    <div class="max-w-4xl mx-auto py-12 px-4">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-blue-500 mb-2 italic">GENETIC ANCESTRY</h1>
            <p class="text-slate-400">Analisis Marker Genomik Global Berdasarkan Spesifikasi Sequencing.com</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                <h2 class="text-xl font-bold mb-6 flex items-center">
                    <span class="bg-blue-500 w-2 h-6 mr-3"></span>Data Biometrik User
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-xs text-slate-400 uppercase">Tinggi Badan (cm)</label>
                        <input type="number" id="h" placeholder="Contoh: 170"
                            class="w-full bg-slate-700 p-3 rounded-lg border border-slate-600 outline-none focus:ring-2 ring-blue-500">
                    </div>
                    <div>
                        <label class="text-xs text-slate-400 uppercase">Golongan Darah</label>
                        <select id="b" class="w-full bg-slate-700 p-3 rounded-lg border border-slate-600 outline-none">
                            <option value="B">Golongan Darah B</option>
                            <option value="A">Golongan Darah A</option>
                            <option value="O">Golongan Darah O</option>
                            <option value="AB">Golongan Darah AB</option>
                        </select>
                    </div>
                    <button onclick="runAnalysis()" id="btnAction"
                        class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold transition-all shadow-lg">
                        MINTA DATA DNA ASLI
                    </button>
                </div>
            </div>

            <div id="resultCard"
                class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl opacity-0 transition-opacity duration-1000">
                <h2 class="text-xl font-bold mb-6 text-center">Hasil Komposisi Etnis</h2>
                <div class="relative h-64">
                    <canvas id="chart"></canvas>
                </div>
                <div id="list" class="mt-8 space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        let myChart;
        async function runAnalysis() {
            const btn = document.getElementById('btnAction');
            btn.innerHTML = "MENGAMBIL DATA...";
            btn.disabled = true;

            const res = await fetch('/api', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    dataFileId: "DEMO_ID_12345",
                    attributes: { h: document.getElementById('h').value, b: document.getElementById('b').value }
                })
            });
            const data = await res.json();

            document.getElementById('resultCard').classList.remove('opacity-0');
            renderUI(data.results);
            btn.innerHTML = "ANALISIS SELESAI";
        }

        function renderUI(results) {
            const ctx = document.getElementById('chart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(results),
                    datasets: [{
                        data: Object.values(results),
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4'],
                        borderWidth: 0
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 20 } } }
                }
            });

            document.getElementById('list').innerHTML = Object.entries(results).map(([k, v]) =>
                `<div class="flex justify-between p-3 bg-slate-900/50 rounded-lg border-l-4 border-blue-500">
                    <span class="font-medium">${k}</span>
                    <span class="text-blue-400 font-bold">${v}%</span>
                </div>`
            ).join('');
        }
    </script>
</body>

</html>
